name: taskforge

services:
  postgres:
    image: postgres:15
    container_name: taskforge-postgres
    environment:
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: taskforge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: