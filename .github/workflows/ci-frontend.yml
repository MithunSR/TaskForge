name: CI - Frontend

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build-and-test:
    name: Install, lint, and test React app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run tests
        working-directory: client
        run: npm run test -- --run

      - name: Build
        working-directory: client
        run: npm run build